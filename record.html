<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Session Recorder - POC</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Oxygen, Ubuntu, Cantarell, sans-serif;
        line-height: 1.6;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      .header {
        background: white;
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 20px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .header h1 {
        color: #333;
        font-size: 24px;
      }

      .recording-status {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .recording-dot {
        width: 12px;
        height: 12px;
        background: #ef4444;
        border-radius: 50%;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      .controls {
        background: white;
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 20px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      .controls h2 {
        margin-bottom: 15px;
        color: #333;
        font-size: 18px;
      }

      .button-group {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      button {
        padding: 10px 20px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.2s;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      }

      .btn-primary {
        background: #667eea;
        color: white;
      }

      .btn-success {
        background: #10b981;
        color: white;
      }

      .btn-danger {
        background: #ef4444;
        color: white;
      }

      .btn-secondary {
        background: #6b7280;
        color: white;
      }

      .demo-content {
        background: white;
        padding: 30px;
        border-radius: 10px;
        margin-bottom: 20px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      .demo-content h2 {
        color: #333;
        margin-bottom: 20px;
      }

      .form-section {
        margin-bottom: 25px;
      }

      .form-group {
        margin-bottom: 15px;
      }

      label {
        display: block;
        margin-bottom: 5px;
        color: #555;
        font-weight: 500;
      }

      input[type="text"],
      input[type="email"],
      textarea,
      select {
        width: 100%;
        padding: 10px;
        border: 2px solid #e5e7eb;
        border-radius: 6px;
        font-size: 14px;
        transition: border-color 0.2s;
      }

      input:focus,
      textarea:focus,
      select:focus {
        outline: none;
        border-color: #667eea;
      }

      textarea {
        resize: vertical;
        min-height: 100px;
      }

      .checkbox-group {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .checkbox-item {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .checkbox-item input[type="checkbox"] {
        width: 18px;
        height: 18px;
        cursor: pointer;
      }

      .interactive-section {
        background: #f9fafb;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 20px;
      }

      .counter {
        text-align: center;
        padding: 20px;
      }

      .counter-value {
        font-size: 48px;
        color: #667eea;
        font-weight: bold;
        margin: 10px 0;
      }

      .sessions-list {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      .sessions-list h2 {
        margin-bottom: 15px;
        color: #333;
      }

      .session-item {
        background: #f9fafb;
        padding: 15px;
        border-radius: 6px;
        margin-bottom: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .session-info {
        flex: 1;
      }

      .session-name {
        font-weight: 600;
        color: #333;
        margin-bottom: 5px;
      }

      .session-meta {
        font-size: 12px;
        color: #6b7280;
      }

      .session-actions {
        display: flex;
        gap: 5px;
      }

      .btn-small {
        padding: 6px 12px;
        font-size: 12px;
      }

      .message {
        padding: 12px;
        border-radius: 6px;
        margin-bottom: 15px;
        font-size: 14px;
      }

      .message-success {
        background: #d1fae5;
        color: #065f46;
        border: 1px solid #10b981;
      }

      .message-error {
        background: #fee2e2;
        color: #991b1b;
        border: 1px solid #ef4444;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <div class="header">
        <h1>🎥 Session Recorder</h1>
        <a href="replay.html" class="btn-primary">▶️ Go to Replay</a>
      </div>

      <!-- Controls -->
      <div class="controls">
        <h2>Recording Controls</h2>
        <div class="button-group">
          <button class="btn-danger" onclick="stopRecording()">
            ⏹️ Stop Recording
          </button>
          <button class="btn-success" onclick="saveCurrentSession()">
            💾 Save Session
          </button>
          <button class="btn-primary" onclick="downloadSession()">
            ⬇️ Download JSON
          </button>
        </div>
      </div>

      <div id="messageContainer"></div>

      <!-- Demo Interactive Content -->
      <div class="demo-content">
        <h2>Interactive Demo Page</h2>
        <p style="color: #6b7280; margin-bottom: 20px">
          Interact with this page - all your actions are being recorded! Try
          filling the form, clicking buttons, typing text, etc.
        </p>

        <!-- Form Section -->
        <div class="form-section">
          <h3 style="margin-bottom: 15px; color: #667eea">Sample Form</h3>

          <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" id="name" placeholder="Enter your name" />
          </div>

          <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="your@email.com" />
          </div>

          <div class="form-group">
            <label for="country">Country:</label>
            <select id="country">
              <option value="">Select a country</option>
              <option value="us">United States</option>
              <option value="uk">United Kingdom</option>
              <option value="ca">Canada</option>
              <option value="au">Australia</option>
              <option value="de">Germany</option>
            </select>
          </div>

          <div class="form-group">
            <label for="message">Message:</label>
            <textarea
              id="message"
              placeholder="Type your message here..."
            ></textarea>
          </div>

          <div class="form-group">
            <label>Interests:</label>
            <div class="checkbox-group">
              <div class="checkbox-item">
                <input type="checkbox" id="tech" value="technology" />
                <label for="tech" style="margin: 0">Technology</label>
              </div>
              <div class="checkbox-item">
                <input type="checkbox" id="sports" value="sports" />
                <label for="sports" style="margin: 0">Sports</label>
              </div>
              <div class="checkbox-item">
                <input type="checkbox" id="music" value="music" />
                <label for="music" style="margin: 0">Music</label>
              </div>
              <div class="checkbox-item">
                <input type="checkbox" id="travel" value="travel" />
                <label for="travel" style="margin: 0">Travel</label>
              </div>
            </div>
          </div>
        </div>

        <!-- Interactive Section -->
        <div class="interactive-section">
          <h3 style="margin-bottom: 15px; color: #667eea">
            Interactive Counter
          </h3>
          <div class="counter">
            <div class="counter-value" id="counterValue">0</div>
            <div class="button-group" style="justify-content: center">
              <button class="btn-primary" onclick="incrementCounter()">
                + Increment
              </button>
              <button class="btn-danger" onclick="decrementCounter()">
                - Decrement
              </button>
              <button class="btn-secondary" onclick="resetCounter()">
                Reset
              </button>
            </div>
          </div>
        </div>

        <div class="button-group">
          <button class="btn-success" onclick="submitForm()">
            Submit Form
          </button>
          <button class="btn-secondary" onclick="clearForm()">
            Clear Form
          </button>
        </div>
      </div>
    </div>

    <!-- Load rrweb and IndexedDB helper -->
    <script src="https://cdn.jsdelivr.net/npm/rrweb@2.0.0-alpha.4/dist/rrweb.min.js"></script>
    <script src="db.js"></script>

    <script>
      // Global variables
      let events = [];
      let stopFn = null;
      let startTime = null;
      let counter = 0;

      // Counter functions
      function incrementCounter() {
        counter++;
        document.getElementById("counterValue").textContent = counter;
      }

      function decrementCounter() {
        counter--;
        document.getElementById("counterValue").textContent = counter;
      }

      function resetCounter() {
        counter = 0;
        document.getElementById("counterValue").textContent = counter;
      }

      // Form functions
      function submitForm() {
        showMessage("Form submitted successfully! (Demo only)", "success");
      }

      function clearForm() {
        document.getElementById("name").value = "";
        document.getElementById("email").value = "";
        document.getElementById("country").value = "";
        document.getElementById("message").value = "";
        document
          .querySelectorAll('input[type="checkbox"]')
          .forEach((cb) => (cb.checked = false));
        showMessage("Form cleared", "success");
      }

      // Show message
      function showMessage(text, type = "success") {
        const container = document.getElementById("messageContainer");
        const message = document.createElement("div");
        message.className = `message message-${type}`;
        message.textContent = text;
        container.innerHTML = "";
        container.appendChild(message);

        setTimeout(() => {
          message.remove();
        }, 3000);
      }

      // Start recording
      function startRecording() {
        events = [];
        startTime = Date.now();

        stopFn = rrweb.record({
          emit(event) {
            events.push(event);
          },
          checkoutEveryNms: 30 * 1000, // Checkout every 30 seconds
        });

        console.log("Recording started");
      }

      // Stop recording
      function stopRecording() {
        if (stopFn) {
          stopFn();
          stopFn = null;
          showMessage("Recording stopped", "success");
        }
      }

      // Save current session to IndexedDB
      async function saveCurrentSession() {
        if (events.length === 0) {
          showMessage("No events to save", "error");
          return;
        }

        try {
          const duration = Date.now() - startTime;
          const sessionName = `Session ${new Date().toLocaleString()}`;

          await saveSession({
            events: events,
            timestamp: startTime,
            duration: duration,
            name: sessionName,
          });

          showMessage(`Session saved! (${events.length} events)`, "success");
        } catch (error) {
          console.error("Error saving session:", error);
          showMessage("Error saving session: " + error.message, "error");
        }
      }

      // Download session as JSON
      function downloadSession() {
        if (events.length === 0) {
          showMessage("No events to download", "error");
          return;
        }

        const dataStr = JSON.stringify(events, null, 2);
        const dataBlob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(dataBlob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `session-${Date.now()}.json`;
        link.click();
        URL.revokeObjectURL(url);

        showMessage("Session downloaded", "success");
      }

      // Initialize on page load
      window.addEventListener("load", () => {
        startRecording();
      });
    </script>
  </body>
</html>
